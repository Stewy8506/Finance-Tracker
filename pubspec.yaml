name: ledger
description: "Personal life budget & goals planner for Indian salary earners."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  fl_chart: ^0.68.0
  intl: ^0.19.0
  uuid: ^4.3.3
  share_plus: ^9.0.0
  go_router: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
